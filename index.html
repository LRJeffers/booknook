                    {showStats && <StatsModal books={books} onClose={()=>setShowStats(false)} theme={theme} t={t} />}

                    {showDeleteConfirm && (
                        <ConfirmModal 
                            title={t.confirmDelete}
                            message={`¿Estás seguro de que quieres eliminar "${showDeleteConfirm.title}"? Esta acción no se puede deshacer.`}
                            onConfirm={confirmDelete}
                            onCancel={()=>setShowDeleteConfirm(null)}
                            theme={theme}
                        />
                    )}

                    {showSettings && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm" onClick={()=>setShowSettings(false)}>
                            <div className={`p-8 rounded-3xl w-full max-w-md shadow-2xl animate-scale-in ${themeData.cardBg} backdrop-blur-xl border ${themeData.border}`} onClick={e=>e.stopPropagation()}>
                                <h2 className="font-serif text-3xl font-bold mb-6 text-center gradient-text">{t.sets}</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className={`block text-sm font-semibold mb-2 ${themeData.textMuted}`}>{t.name}</label>
                                        <input value={name} onChange={e=>setName(e.target.value)} placeholder={t.name} className={`w-full ${themeData.input} border ${themeData.border} rounded-xl p-3 outline-none focus:ring-2 focus:ring-amber-400/30`}/>
                                    </div>
                                    
                                    <div className={`p-4 rounded-xl ${themeData.input} border ${themeData.border}`}>
                                        <h3 className="font-semibold mb-3">{t.keyboardShortcuts}</h3>
                                        <div className="space-y-2 text-sm">
                                            <div className="flex justify-between"><span>{t.newBook}</span><kbd className="px-2 py-1 rounded bg-white/10">N</kbd></div>
                                            <div className="flex justify-between"><span>{t.focusSearch}</span><kbd className="px-2 py-1 rounded bg-white/10">Ctrl+F</kbd></div>
                                            <div className="flex justify-between"><span>{t.closeModal}</span><kbd className="px-2 py-1 rounded bg-white/10">ESC</kbd></div>
                                        </div>
                                    </div>

                                    <div className="flex gap-3 pt-4">
                                        <button onClick={exportLibrary} className={`flex-1 py-3 rounded-xl font-semibold btn-glow bg-gradient-to-r ${themeData.accent} text-white flex items-center justify-center gap-2`}>
                                            <Icons.Download size={18}/>{t.backup}
                                        </button>
                                        <button onClick={()=>{importRef.current.click(); setShowSettings(false);}} className={`flex-1 py-3 rounded-xl font-semibold border ${themeData.border} ${themeData.input} flex items-center justify-center gap-2`}>
                                            <Icons.Upload size={18}/>{t.import}
                                        </button>
                                    </div>
                                    <button onClick={()=>setShowSettings(false)} className={`w-full py-3 rounded-xl font-semibold btn-glow bg-gradient-to-r ${themeData.accent} text-white mt-4`}>OK</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
