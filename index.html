        body {

        .font-serif { font-family: 'Cormorant Garamond', serif; }
        
        .animate-fade-in { animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-slide-up { animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-scale-in { animation: scaleIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-dark {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }
        
        .book-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .book-card:hover {
            transform: translateY(-8px) rotateX(2deg);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.3);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #d4af37 0%, #f4e5c2 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-glow {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-glow::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        .btn-glow:hover::before { left: 100%; }
        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.4);
        }
        
        .input-elegant {
            transition: all 0.3s ease;
            border-bottom: 2px solid rgba(255,255,255,0.2);
        }
        .input-elegant:focus {
            border-bottom-color: #d4af37;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.15);
        }

        .progress-bar {
            background: linear-gradient(90deg, #d4af37 0%, #f4e5c2 100%);
            transition: width 0.5s ease;
        }

        .tag {
            transition: all 0.2s ease;
        }
        .tag:hover {
            transform: scale(1.05);
        }
        .tag.active {
            background: linear-gradient(135deg, #d4af37, #f4e5c2);
            color: #000;
        }

        @media (max-width: 768px) {
            input, textarea, select {
                font-size: 16px !important;
            }
            button, .book-card {
                min-height: 44px;
                min-width: 44px;
            }
            * {
                touch-action: manipulation;
            }
            .book-card:active {
                transform: scale(0.98);
            }
        }
    </style>

        const AVAILABLE_TAGS = [
            'Fantasy', 'Romance', 'Mystery', 'Sci-Fi', 'Thriller', 'Horror',

        ];

        const playSound = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const t = ctx.currentTime;

                if (type === 'slam') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.frequency.setValueAtTime(80, t); 
                    osc.frequency.exponentialRampToValueAtTime(10, t + 0.3);
                    gain.gain.setValueAtTime(0.5, t);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(t);
                    osc.stop(t + 0.4);
                } else {
                    const bufferSize = ctx.sampleRate * 0.3;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 800;
                    const gain = ctx.createGain();
                    gain.gain.setValueAtTime(0.01, t);
                    gain.gain.linearRampToValueAtTime(0.1, t + 0.1);
                    gain.gain.linearRampToValueAtTime(0.01, t + 0.25);
                    noise.connect(filter);
                    filter.connect(gain);
                    gain.connect(ctx.destination);
                    noise.start(t);
                }
            } catch(e) {}
        };
