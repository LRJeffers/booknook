to-transparent opacity-0 group-hover:opacity-100 transition"></div>{b.progress>0&&b.progress<100&&<div className="absolute bottom-0 left-0 right-0 h-1 bg-black/50"><div className="progress-bar h-full" style={{width:`${b.progress}%`}}></div></div>}</div><div className="p-4 space-y-3"><div><h3 className="font-serif text-xl font-bold leading-tight line-clamp-2 mb-1">{b.title}</h3><p className={`text-sm ${td.textMuted} truncate`}>{b.author}</p></div><div className="flex items-center justify-between"><div className="flex gap-0.5">{[1,2,3,4,5].map(n=><Icons.Star key={n} size={14} fill={n<=b.rating?td.primary:'none'} stroke={td.primary}/>)}</div>{b.spice>0&&<div className="flex gap-0.5">{[1,2,3].map(n=><Icons.Flame key={n} size={12} fill={n<=b.spice?'#f97316':'none'} stroke={n<=b.spice?'#f97316':'currentColor'}/>)}</div>}</div>{b.tags&&b.tags.length>0&&<div className="flex flex-wrap gap-1">{b.tags.slice(0,3).map((tag,i)=><span key={i} className="text-[10px] px-2 py-0.5 rounded-full bg-white/10">{tag}</span>)}{b.tags.length>3&&<span className="text-[10px] px-2 py-0.5 opacity-60">+{b.tags.length-3}</span>}</div>}<div className="flex gap-2 pt-2 border-t border-white/10">{b.playlist&&<div className="flex-1 text-center text-xs opacity-60"><Icons.Music size={12} className="inline"/></div>}{b.characters?.length>0&&<div className="flex-1 text-center text-xs opacity-60"><Icons.User size={12} className="inline"/>{b.characters.length}</div>}{b.quotes?.length>0&&<div className="flex-1 text-center text-xs opacity-60"><Icons.Quote size={12} className="inline"/>{b.quotes.length}</div>}</div></div></div>)}</div>)}</main><button onClick={()=>setShowAdd(true)} className={`fixed bottom-8 right-8 p-5 rounded-2xl text-white shadow-large btn-glow z-40 bg-gradient-to-br ${td.accent}`}><Icons.Plus size={28}/></button>{showAdd&&(<div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md animate-fade-in"><div className={`w-full max-w-3xl max-h-[90vh] overflow-y-auto rounded-3xl p-8 relative shadow-2xl animate-scale-in ${td.cardBg} backdrop-blur-xl border ${td.border}`}><button onClick={()=>setShowAdd(false)} className="absolute top-4 right-4 p-2 rounded-full bg-black/40 hover:bg-black/60 transition"><Icons.X size={20}/></button><h2 className="font-serif text-4xl font-bold text-center mb-8 gradient-text">{t.add}</h2><div className="space-y-6"><div className="flex gap-6"><div className="w-1/3 space-y-3"><div onClick={()=>fileRef.current.click()} className="aspect-[2/3] rounded-2xl border-2 border-dashed border-white/30 flex flex-col items-center justify-center cursor-pointer hover:border-amber-400 transition overflow-hidden">{form.cover?<img src={form.cover} className="w-full h-full object-cover"/>:<div className="text-center p-4 opacity-60"><Icons.Upload size={32} className="mx-auto mb-2"/><span className="text-xs">{t.cover}</span></div>}</div><input type="file" ref={fileRef} hidden accept="image/*" onChange={handleCoverUpload}/></div><div className="w-2/3 space-y-4"><input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder={t.titlePH} className="input-elegant w-full bg-transparent p-3 text-2xl font-serif font-bold outline-none"/><input value={form.author} onChange={e=>setForm({...form,author:e.target.value})} placeholder={t.authPH} className="input-elegant w-full bg-transparent p-3 outline-none"/><div className="flex items-center gap-3 p-3 rounded-xl bg-white/5"><input type="checkbox" checked={form.isRomance} onChange={e=>setForm({...form,isRomance:e.target.checked})} className="w-5 h-5 rounded accent-amber-500"/><span className="font-semibold">{t.rom}</span></div></div></div><div className={`p-4 rounded-2xl ${td.input} border ${td.border} flex gap-3`}><input value={prompt} onChange={e=>setPrompt(e.target.value)} placeholder="Ej. Castillo oscuro..." className="flex-1 bg-transparent text-sm outline-none"/><button onClick={generateAI} disabled={loading} className={`px-5 py-2.5 rounded-xl bg-gradient-to-r from-purple-500 to-indigo-600 text-white text-sm font-semibold btn-glow flex items-center gap-2`}><Icons.Wand size={16}/>{loading?'...':t.gen}</button></div>{aiError&&<p className="text-sm text-red-400 flex items-center gap-2"><Icons.Alert size={16}/>{aiError}</p>}<div><label className={`block text-sm font-semibold mb-2 ${td.textMuted}`}>{t.selectTags}</label><div className="flex flex-wrap gap-2 max-h-32 overflow-y-auto p-3 rounded-xl bg-white/5">{AVAILABLE_TAGS.map(tag=><button key={tag} type="button" onClick={()=>toggleTag(tag)} className={`tag px-3 py-1.5 rounded-full text-xs font-semibold border ${form.tags.includes(tag)?'active':`${td.input} ${td.border}`}`}>{tag}</button>)}</div></div><div className={`p-4 rounded-2xl ${td.input} border ${td.border}`}><h3 className="font-semibold mb-4">{t.progress}</h3><div className="space-y-3"><div><label className={`block text-xs mb-1 ${td.textMuted}`}>{t.currentPage}</label><input type="number" value={form.currentPage||''} onChange={e=>setForm({...form,currentPage:parseInt(e.target.value)||0})} className={`w-full px-3 py-2 rounded-lg ${td.input} border ${td.border} outline-none`} placeholder="0"/></div><div><label className={`block text-xs mb-1 ${td.textMuted}`}>{t.totalPages}</label><input type="number" value={form.totalPages||''} onChange={e=>{const total=parseInt(e.target.value)||0,current=form.currentPage||0,progress=total>0?Math.round((current/total)*100):0;setForm({...form,totalPages:total,progress});}} className={`w-full px-3 py-2 rounded-lg ${td.input} border ${td.border} outline-none`} placeholder="0"/></div>{form.totalPages>0&&form.currentPage>0&&<div><div className="flex justify-between text-xs mb-1"><span>{t.progress}</span><span className="font-bold" style={{color:td.primary}}>{form.progress}%</span></div><div className="w-full bg-black/30 rounded-full h-2"><div className="progress-bar h-2 rounded-full" style={{width:`${form.progress}%`}}></div></div></div>}</div></div><div className="flex justify-between items-center p-4 rounded-xl bg-white/5"><span className="text-sm font-bold uppercase tracking-wider opacity-70">{t.rating}</span><div className="flex gap-2">{[1,2,3,4,5].map(n=><div key={n} className="cursor-pointer hover:scale-110 transition" onClick={()=>setForm({...form,rating:n})}><Icons.Star size={32} fill={n<=form.rating?td.primary:'none'} stroke={td.primary}/></div>)}</div></div>{form.isRomance&&<div className="flex justify-between items-center p-4 rounded-xl bg-white/5 animate-slide-up"><span className="text-sm font-bold uppercase tracking-wider opacity-70">{t.spice}</span><div className="flex gap-2">{[1,2,3,4,5].map(n=><div key={n} className="cursor-pointer hover:scale-110 transition" onClick={()=>setForm({...form,spice:n})}><Icons.Flame size={32} fill={n<=form.spice?'#f97316':'none'} stroke={n<=form.spice?'#f97316':'currentColor'}/></div>)}</div></div>}<input value={form.playlist} onChange={e=>setForm({...form,playlist:e.target.value})} placeholder={t.playPH} className="input-elegant w-full bg-transparent p-3 outline-none rounded-lg"/><textarea value={form.review} onChange={e=>setForm({...form,review:e.target.value})} placeholder={t.revPH} rows="4" className={`w-full ${td.input} border ${td.border} rounded-xl p-4 outline-none resize-none`}></textarea><button onClick={handleSave} className={`w-full py-4 rounded-2xl font-serif text-xl font-bold text-white shadow-large btn-glow bg-gradient-to-r ${td.accent}`}>{t.save}</button></div></div></div>)}{viewBook&&<BookModal book={viewBook} onClose={()=>setViewBook(null)} theme={theme} t={t} onUpdate={updateBook}/>}
{showStats&&(<div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md" onClick={()=>setShowStats(false)}><div className={`w-full max-w-2xl max-h-[80vh] overflow-y-auto rounded-3xl p-8 shadow-2xl animate-scale-in ${td.cardBg} backdrop-blur-xl border ${td.border}`} onClick={e=>e.stopPropagation()}><div className="flex justify-between items-center mb-6"><h2 className="font-serif text-4xl font-bold gradient-text">{t.stats}</h2><button onClick={()=>setShowStats(false)} className="p-2 rounded-full bg-black/40"><Icons.X size={20}/></button></div><div className="grid grid-cols-2 gap-4 mb-8"><div className={`p-6 rounded-2xl ${td.input} border ${td.border}`}><div className="text-4xl font-bold mb-2" style={{color:td.primary}}>{books.filter(b=>b.dates?.some(d=>d.startsWith(new Date().getFullYear().toString()))).length}</div><div className={`text-sm ${td.textMuted}`}>{t.booksRead}</div></div><div className={`p-6 rounded-2xl ${td.input} border ${td.border}`}><div className="text-4xl font-bold mb-2" style={{color:td.primary}}>{books.length>0?(books.reduce((s,b)=>s+(b.rating||0),0)/books.length).toFixed(1):0}⭐</div><div className={`text-sm ${td.textMuted}`}>{t.avgRating}</div></div></div></div></div>)}
{showDeleteConfirm&&(<div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/90 backdrop-blur-md animate-fade-in"><div className={`w-full max-w-md p-8 rounded-3xl shadow-2xl animate-scale-in ${td.cardBg} border ${td.border}`}><div className="flex items-center gap-4 mb-6"><div className="p-3 rounded-full bg-red-500/20"><Icons.Alert size={32} className="text-red-500"/></div><h3 className="font-serif text-2xl font-bold">{t.confirmDelete}</h3></div><p className="mb-8 text-lg">¿Eliminar "{showDeleteConfirm.title}"?</p><div className="flex gap-4"><button onClick={()=>setShowDeleteConfirm(null)} className={`flex-1 py-3 rounded-xl font-semibold border ${td.border} ${td.input}`}>{t.cancel}</button><button onClick={confirmDelete} className="flex-1 py-3 rounded-xl font-semibold bg-gradient-to-r from-red-600 to-rose-700 text-white btn-glow">{t.delete}</button></div></div></div>)}
{showSettings&&(<div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm" onClick={()=>setShowSettings(false)}><div className={`p-8 rounded-3xl w-full max-w-md shadow-2xl animate-scale-in ${td.cardBg} backdrop-blur-xl border ${td.border}`} onClick={e=>e.stopPropagation()}><h2 className="font-serif text-3xl font-bold mb-6 text-center gradient-text">{t.sets}</h2><div className="space-y-4"><div><label className={`block text-sm font-semibold mb-2 ${td.textMuted}`}>{t.name}</label><input value={name} onChange={e=>setName(e.target.value)} placeholder={t.name} className={`w-full ${td.input} border ${td.border} rounded-xl p-3 outline-none`}/></div><div className="flex gap-3 pt-4"><button onClick={exportLib} className={`flex-1 py-3 rounded-xl font-semibold btn-glow bg-gradient-to-r ${td.accent} text-white flex items-center justify-center gap-2`}><Icons.Download size={18}/>{t.backup}</button><button onClick={()=>{importRef.current.click();setShowSettings(false);}} className={`flex-1 py-3 rounded-xl font-semibold border ${td.border} ${td.input} flex items-center justify-center gap-2`}><Icons.Upload size={18}/>{t.import}</button></div><button onClick={()=>setShowSettings(false)} className={`w-full py-3 rounded-xl font-semibold btn-glow bg-gradient-to-r ${td.accent} text-white mt-4`}>OK</button></div></div></div>)}</div>);};
        const root=ReactDOM.createRoot(document.getElementById('root'));root.render(<App/>);
