        body {

        }
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        
        .animate-fade-in { animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-slide-up { animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-scale-in { animation: scaleIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-dark {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }
        
        .book-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .book-card:hover {
            transform: translateY(-8px) rotateX(2deg);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.3);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #d4af37 0%, #f4e5c2 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-glow {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-glow::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        .btn-glow:hover::before { left: 100%; }
        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.4);
        }
        
        .input-elegant {
            transition: all 0.3s ease;
            border-bottom: 2px solid rgba(255,255,255,0.2);
        }
        .input-elegant:focus {
            border-bottom-color: #d4af37;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.15);
        }

        /* Progress bar */
        .progress-bar {
            background: linear-gradient(90deg, #d4af37 0%, #f4e5c2 100%);
            transition: width 0.5s ease;
        }

        /* Tag styles */
        .tag {
            transition: all 0.2s ease;
        }
        .tag:hover {
            transform: scale(1.05);
        }
        .tag.active {
            background: linear-gradient(135deg, #d4af37, #f4e5c2);
            color: #000;
        }

        /* Optimización móvil */
        @media (max-width: 768px) {
            input, textarea, select {
                font-size: 16px !important;
            }
            button, .book-card {
                min-height: 44px;
                min-width: 44px;
            }
            * {
                touch-action: manipulation;
            }
            .book-card:active {
                transform: scale(0.98);
            }
        }
    </style>

                newest: "Mais recente", oldest: "Mais antigo", highestRated: "Melhor avaliados", lowestRated: "Menor avaliados",
                titleAZ: "Título A-Z", titleZA: "Título Z-A", authorAZ: "Autor A-Z", progress: "Progresso", currentPage: "Página atual",
                totalPages: "Total páginas", startDate: "Data início", endDate: "Data fim", completed: "Completo", stats: "Estatísticas",
                booksRead: "Livros lidos", avgRating: "Média", favoriteGenre: "Gênero favorito", thisYear: "Este ano",
                readingGoal: "Meta de leitura", tags: "Gêneros/Tags", addTag: "Adicionar tag", selectTags: "Selecionar tags",
                shortcuts: "Atalhos", keyboardShortcuts: "Atalhos de teclado", newBook: "Novo livro (N)", closeModal: "Fechar (ESC)",
                focusSearch: "Buscar (Ctrl+F)", deleteConfirm: "Confirmar exclusão", cancel: "Cancelar", delete: "Excluir",
                reading: "Lendo", finished: "Finalizado", toRead: "Para ler"
            }
        };

        const AVAILABLE_TAGS = [
            'Fantasy', 'Romance', 'Mystery', 'Sci-Fi', 'Thriller', 'Horror', 
            'Historical', 'Contemporary', 'Paranormal', 'Urban Fantasy', 
            'Dark Romance', 'LGBTQ+', 'YA', 'Adult', 'Classic', 'Adventure',
            'Drama', 'Comedy', 'Supernatural', 'Shapeshifter'
        ];

        const playSound = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const t = ctx.currentTime;

                if (type === 'slam') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.frequency.setValueAtTime(80, t); 
                    osc.frequency.exponentialRampToValueAtTime(10, t + 0.3);
                    gain.gain.setValueAtTime(0.5, t);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(t);
                    osc.stop(t + 0.4);
                } else {
                    const bufferSize = ctx.sampleRate * 0.3;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 800;
                    const gain = ctx.createGain();
                    gain.gain.setValueAtTime(0.01, t);
                    gain.gain.linearRampToValueAtTime(0.1, t + 0.1);
                    gain.gain.linearRampToValueAtTime(0.01, t + 0.25);
                    noise.connect(filter);
                    filter.connect(gain);
                    gain.connect(ctx.destination);
                    noise.start(t);
                }
            } catch(e) {}
        };

        const safeLocalStorage = {
            get: (key) => { try { return localStorage.getItem(key); } catch(e) { return null; } },
            set: (key, val) => { try { localStorage.setItem(key, val); return true; } catch(e) { return false; } }
        };

        const validateImageFile = (file) => {
            if (!file.type.startsWith('image/')) return { ok: false, msg: 'Solo imágenes' };
            if (file.size > 5 * 1024 * 1024) return { ok: false, msg: 'Máx 5MB' };
            return { ok: true };
        };

        // Componente de Estadísticas
        const StatsModal = ({ books, onClose, theme, t }) => {
            const themeData = THEMES[theme] || THEMES['midnight'];
            const currentYear = new Date().getFullYear();
            
            const booksThisYear = books.filter(b => {
                if (!b.dates) return false;
                return b.dates.some(d => d.startsWith(currentYear.toString()));
            }).length;

            const avgRating = books.length > 0 
                ? (books.reduce((sum, b) => sum + (b.rating || 0), 0) / books.length).toFixed(1)
                : 0;

            const genreCount = {};
            books.forEach(b => {
                if (b.tags) {
                    b.tags.forEach(tag => {
                        genreCount[tag] = (genreCount[tag] || 0) + 1;
                    });
                }
            });
            const favoriteGenre = Object.entries(genreCount).sort((a, b) => b[1] - a[1])[0]?.[0] || '-';

            const readingStatus = {
                reading: books.filter(b => b.progress && b.progress < 100).length,
                finished: books.filter(b => b.progress === 100).length,
                toRead: books.filter(b => !b.progress || b.progress === 0).length
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md" onClick={onClose}>
                    <div className={`w-full max-w-2xl max-h-[80vh] overflow-y-auto rounded-3xl p-8 shadow-2xl animate-scale-in ${themeData.cardBg} backdrop-blur-xl border ${themeData.border}`} onClick={e=>e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="font-serif text-4xl font-bold gradient-text">{t.stats}</h2>
                            <button onClick={onClose} className="p-2 rounded-full bg-black/40 hover:bg-black/60 transition">
                                <Icons.X size={20}/>
                            </button>
                        </div>

                        <div className="grid grid-cols-2 gap-4 mb-8">
                            <div className={`p-6 rounded-2xl ${themeData.input} border ${themeData.border}`}>
                                <div className="text-4xl font-bold mb-2" style={{color: themeData.primary}}>{booksThisYear}</div>
                                <div className={`text-sm ${themeData.textMuted}`}>{t.booksRead} ({t.thisYear})</div>
                            </div>
                            <div className={`p-6 rounded-2xl ${themeData.input} border ${themeData.border}`}>
                                <div className="text-4xl font-bold mb-2" style={{color: themeData.primary}}>{avgRating}⭐</div>
                                <div className={`text-sm ${themeData.textMuted}`}>{t.avgRating}</div>
                            </div>
                        </div>

                        <div className={`p-6 rounded-2xl ${themeData.input} border ${themeData.border} mb-6`}>
                            <h3 className="font-serif text-xl font-semibold mb-4">{t.favoriteGenre}</h3>
                            <div className="flex flex-wrap gap-2">
                                {favoriteGenre !== '-' ? (
                                    <span className="px-4 py-2 rounded-full bg-gradient-to-r from-amber-500 to-yellow-600 text-white font-semibold">
                                        {favoriteGenre}
                                    </span>
                                ) : (
                                    <span className={themeData.textMuted}>Sin datos suficientes</span>
                                )}
                            </div>
                        </div>

                        <div className={`p-6 rounded-2xl ${themeData.input} border ${themeData.border}`}>
                            <h3 className="font-serif text-xl font-semibold mb-4">Estado de lectura</h3>
                            <div className="space-y-3">
                                <div className="flex justify-between items-center">
                                    <span className="flex items-center gap-2"><Icons.Book size={16}/> {t.reading}</span>
                                    <span className="font-bold" style={{color: themeData.primary}}>{readingStatus.reading}</span>
                                </div>
                                <div className="flex justify-between items-center">
                                    <span className="flex items-center gap-2"><Icons.Check size={16}/> {t.finished}</span>
                                    <span className="font-bold" style={{color: themeData.primary}}>{readingStatus.finished}</span>
                                </div>
                                <div className="flex justify-between items-center">
                                    <span className="flex items-center gap-2"><Icons.Calendar size={16}/> {t.toRead}</span>
                                    <span className="font-bold" style={{color: themeData.primary}}>{readingStatus.toRead}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Modal de confirmación
        const ConfirmModal = ({ title, message, onConfirm, onCancel, theme }) => {
            const themeData = THEMES[theme] || THEMES['midnight'];
            
            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/90 backdrop-blur-md animate-fade-in">
                    <div className={`w-full max-w-md p-8 rounded-3xl shadow-2xl animate-scale-in ${themeData.cardBg} border ${themeData.border}`}>
                        <div className="flex items-center gap-4 mb-6">
                            <div className="p-3 rounded-full bg-red-500/20">
                                <Icons.Alert size={32} className="text-red-500"/>
                            </div>
                            <h3 className="font-serif text-2xl font-bold">{title}</h3>
                        </div>
                        <p className="mb-8 text-lg">{message}</p>
                        <div className="flex gap-4">
                            <button onClick={onCancel} className={`flex-1 py-3 rounded-xl font-semibold border ${themeData.border} ${themeData.input} hover:opacity-80 transition`}>
                                {TEXTS.ES.cancel}
                            </button>
                            <button onClick={onConfirm} className="flex-1 py-3 rounded-xl font-semibold bg-gradient-to-r from-red-600 to-rose-700 text-white btn-glow">
                                {TEXTS.ES.delete}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const Welcome = ({ onEnter, lang, setLang }) => {
            const [exiting, setExiting] = useState(false);
            const t = TEXTS[lang];
            
            return (
                <div className={`fixed inset-0 z-50 flex flex-col items-center justify-center transition-all duration-1000 ${exiting ? 'opacity-0 scale-110 pointer-events-none' : 'opacity-100'}`}>
                    <div className="absolute inset-0 bg-cover bg-center" style={{backgroundImage: `url('${THEMES.midnight.backgroundImage}')`}}>
                        <div className="absolute inset-0 bg-gradient-to-b from-black/70 via-black/50 to-black/80"></div>
                    </div>
                    
                    <div className="relative z-10 text-center space-y-10 p-8 max-w-2xl">
                        <div className="space-y-3">
                            <h1 className="font-serif text-7xl md:text-8xl font-bold gradient-text drop-shadow-2xl tracking-wide">
                                {t.welcome}
                            </h1>
                            <p className="text-xl text-amber-200/80 font-light tracking-widest uppercase">{t.subtitle}</p>
                        </div>
                        
                        <div className="flex gap-3 justify-center">
                            {['ES','EN','PT'].map(l => (
                                <button 
                                    key={l} 
                                    onClick={()=>setLang(l)} 
                                    className={`px-6 py-2.5 rounded-full text-sm font-semibold border transition-all duration-300 ${
                                        lang===l 
                                        ? 'bg-gradient-to-r from-amber-500 to-yellow-600 text-white border-transparent shadow-glow scale-105' 
                                        : 'border-white/30 text-white/80 hover:bg-white/10 hover:border-white/50'
                                    }`}
                                >
                                    {l}
                                </button>
                            ))}
                        </div>
                        
                        <button 
                            onClick={()=>{setExiting(true); setTimeout(onEnter, 800);}} 
                            className="group px-12 py-4 bg-gradient-to-r from-amber-500 to-yellow-600 text-white font-serif text-2xl font-semibold rounded-2xl shadow-large btn-glow tracking-wide"
                        >
                            {t.enter}
                            <span className="inline-block ml-2 transition-transform group-hover:translate-x-1">→</span>
                        </button>
                    </div>
                </div>
            );
        };

        const BookModal = ({ book, onClose, theme, t, onUpdate }) => {
            const [tab, setTab] = useState('review');
            const [newQuote, setNewQuote] = useState('');
            const [charForm, setCharForm] = useState({ name: '', role: '', desc: '', img: null });
            const [charLoading, setCharLoading] = useState(false);
            const [aiError, setAiError] = useState('');
            const charFileRef = useRef();

            const themeData = THEMES[theme] || THEMES['midnight'];
            const inputClass = `w-full ${themeData.input} border-b-2 border-white/20 p-3 outline-none text-sm rounded-t-lg`;

            const addQuote = () => { if(!newQuote) return; onUpdate({ ...book, quotes: [...(book.quotes||[]), newQuote] }); setNewQuote(''); };
            
            const addChar = () => { 
                if(!charForm.name) return; 
                onUpdate({ ...book, characters: [...(book.characters||[]), { ...charForm, id: Date.now() }] }); 
                setCharForm({ name: '', role: '', desc: '', img: null }); 
            };
            
            const toggleDate = (day) => {
                const d = new Date().getFullYear() + '-' + (new Date().getMonth()+1) + '-' + day;
                const newDates = (book.dates||[]).includes(d) ? book.dates.filter(x=>x!==d) : [...(book.dates||[]), d];
                onUpdate({ ...book, dates: newDates });
            };
            
            const genCharAI = async () => {
                if(!charForm.role) return; 
                setCharLoading(true);
                setAiError('');
                try {
                    const res = await fetch(`https://image.pollinations.ai/prompt/${encodeURIComponent(`watercolor portrait ${charForm.role} ${charForm.desc}`)}?width=300&height=300&nologo=true`);
                    if(!res.ok) throw new Error('Error en IA');
                    const blob = await res.blob();
                    const r = new FileReader(); 
                    r.onload=()=>{setCharForm({...charForm, img:r.result}); setCharLoading(false)}; 
                    r.readAsDataURL(blob);
                } catch(e){
                    setAiError('No se pudo generar. Intenta de nuevo.');
                    setCharLoading(false);
                }
            };

            const handleCharImage = (e) => {
                const f = e.target.files[0];
                if(!f) return;
                const val = validateImageFile(f);
                if(!val.ok) { alert(val.msg); e.target.value = ''; return; }
                const r = new FileReader(); 
                r.onload=()=>setCharForm({...charForm, img:r.result}); 
                r.readAsDataURL(f);
            };

            const daysInMonth = new Date(new Date().getFullYear(), new Date().getMonth()+1, 0).getDate();

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md animate-fade-in" onClick={onClose}>
                    <div className={`w-full max-w-5xl max-h-[90vh] overflow-y-auto rounded-3xl relative flex flex-col md:flex-row shadow-2xl animate-scale-in ${themeData.cardBg} backdrop-blur-xl border ${themeData.border}`} onClick={e=>e.stopPropagation()}>
                        <div className={`absolute top-0 left-0 right-0 h-32 bg-gradient-to-br ${themeData.accent} opacity-20 rounded-t-3xl`}></div>
                        
                        <button onClick={onClose} className="absolute top-4 right-4 p-2 rounded-full bg-black/40 hover:bg-black/60 transition z-20 backdrop-blur-sm">
                            <Icons.X size={20}/>
                        </button>
                        
                        <div className="w-full md:w-2/5 flex-shrink-0 p-6 md:p-8 flex flex-col gap-6">
                            <div className="aspect-[2/3] rounded-2xl overflow-hidden shadow-large bg-gray-800 relative group">
                                {book.cover ? (
                                    <img src={book.cover} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"/>
                                ) : (
                                    <div className={`w-full h-full flex items-center justify-center text-center p-4 bg-gradient-to-br ${themeData.accent}`}>
                                        <span className="font-serif text-3xl text-white font-semibold">{book.title}</span>
                                    </div>
                                )}
                            </div>
                            
                            <div className="space-y-3">
                                <h2 className="font-serif text-4xl font-bold leading-tight">{book.title}</h2>
                                <p className={`${themeData.textMuted} text-lg`}>{book.author}</p>
                                
                                <div className="flex gap-1 pt-2">
                                    {[1,2,3,4,5].map(n => (
                                        <Icons.Star key={n} size={22} fill={n<=book.rating ? themeData.primary : 'none'} stroke={themeData.primary}/>
                                    ))}
                                </div>
                                
                                {book.playlist && (
                                    <a href={book.playlist} target="_blank" className={`inline-flex items-center gap-2 mt-3 px-4 py-2 rounded-full ${themeData.input} border ${themeData.border} hover:opacity-80 transition text-sm`}>
                                        <Icons.Music size={16}/> {t.listen}
                                    </a>
                                )}

                                {/* Progreso de lectura */}
                                {book.progress !== undefined && (
                                    <div className={`mt-4 p-4 rounded-xl ${themeData.input} border ${themeData.border}`}>
                                        <div className="flex justify-between mb-2">
                                            <span className="text-sm font-semibold">{t.progress}</span>
                                            <span className="text-sm font-bold" style={{color: themeData.primary}}>{book.progress}%</span>
                                        </div>
                                        <div className="w-full bg-black/30 rounded-full h-2">
                                            <div className="progress-bar h-2 rounded-full" style={{width: `${book.progress}%`}}></div>
                                        </div>
                                        {book.currentPage && (
                                            <p className={`text-xs mt-2 ${themeData.textMuted}`}>{t.currentPage}: {book.currentPage} / {t.totalPages}: {book.totalPages}</p>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="w-full md:w-3/5 flex flex-col p-6 md:p-8">
                            <div className="flex gap-2 pb-4 mb-6 border-b border-white/10 overflow-x-auto">
                                {[
                                    {id:'review', icon:<Icons.Book/>, label:t.tabReview},
                                    {id:'chars', icon:<Icons.User/>, label:t.tabChars},
                                    {id:'quotes', icon:<Icons.Quote/>, label:t.tabQuotes},
                                    {id:'cal', icon:<Icons.Calendar/>, label:t.tabCal}
                                ].map(x => (
                                    <button 
                                        key={x.id} 
                                        onClick={()=>setTab(x.id)} 
                                        className={`flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold transition-all duration-300 whitespace-nowrap ${
                                            tab===x.id 
                                            ? `bg-gradient-to-r ${themeData.accent} text-white shadow-medium` 
                                            : `${themeData.input} hover:opacity-80`
                                        }`}
                                    >
                                        {x.icon} {x.label}
                                    </button>
                                ))}
                            </div>
                            
                            <div className="flex-1 overflow-y-auto pr-2 min-h-[300px]">
                                {tab==='review' && (
                                    <div className="animate-fade-in space-y-4">
                                        <p className="whitespace-pre-wrap italic leading-relaxed text-lg">{book.review || "Sin reseña..."}</p>
                                        {book.isRomance && book.spice > 0 && (
                                            <div className={`flex items-center gap-3 p-4 rounded-xl ${themeData.input} border ${themeData.border}`}>
                                                <Icons.Flame size={24} className="text-orange-500" fill="#f97316"/>
                                                <div>
                                                    <p className="font-semibold">{t.spice}</p>
                                                    <div className="flex gap-1 mt-1">
                                                        {[1,2,3,4,5].map(n => (
                                                            <Icons.Flame key={n} size={16} fill={n<=book.spice ? '#f97316' : 'none'} stroke={n<=book.spice ? '#f97316' : 'currentColor'}/>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                        {book.tags && book.tags.length > 0 && (
                                            <div className="flex flex-wrap gap-2 mt-4">
                                                {book.tags.map((tag, i) => (
                                                    <span key={i} className="px-3 py-1 rounded-full bg-gradient-to-r from-amber-500/20 to-yellow-600/20 border border-amber-500/30 text-sm">
                                                        {tag}
                                                    </span>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}
                                
                                {tab==='chars' && (
                                    <div className="space-y-6 animate-fade-in">
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            {(book.characters||[]).map(c => (
                                                <div key={c.id} className={`flex gap-3 p-4 rounded-xl ${themeData.input} border ${themeData.border} hover:shadow-medium transition`}>
                                                    <div className="w-14 h-14 rounded-full overflow-hidden bg-gradient-to-br from-amber-400 to-yellow-600 flex-shrink-0 flex items-center justify-center text-xl font-bold">
                                                        {c.img ? <img src={c.img} className="w-full h-full object-cover"/> : c.name[0]}
                                                    </div>
                                                    <div className="min-w-0 flex-1">
                                                        <p className="font-serif text-lg font-bold truncate">{c.name}</p>
                                                        <p className={`text-xs ${themeData.textMuted} truncate`}>{c.role}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        
                                        <div className={`border-t ${themeData.border} pt-6 space-y-4`}>
                                            <h3 className="font-serif text-xl font-semibold">{t.addChar}</h3>
                                            <div className="flex gap-4">
                                                <div onClick={()=>charFileRef.current.click()} className="w-16 h-16 rounded-full border-2 border-dashed border-white/30 flex items-center justify-center cursor-pointer overflow-hidden hover:border-amber-400 transition">
                                                    {charForm.img ? <img src={charForm.img} className="w-full h-full object-cover"/> : <span className="text-xs text-center px-1">{t.cover}</span>}
                                                </div>
                                                <input type="file" ref={charFileRef} hidden accept="image/*" onChange={handleCharImage}/>
                                                <div className="flex-1 space-y-3">
                                                    <input value={charForm.name} onChange={e=>setCharForm({...charForm,name:e.target.value})} placeholder={t.charName} className={inputClass}/>
                                                    <div className="flex gap-2">
                                                        <input value={charForm.role} onChange={e=>setCharForm({...charForm,role:e.target.value})} placeholder={t.charRole} className={`${inputClass} flex-1`}/>
                                                        <button onClick={genCharAI} disabled={charLoading} className={`px-4 py-2 rounded-xl bg-gradient-to-r from-purple-500 to-indigo-600 text-white text-sm font-semibold btn-glow flex items-center gap-2`}>
                                                            <Icons.Wand size={16}/> {charLoading?'...':t.gen}
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                            {aiError && <p className="text-sm text-red-400 flex items-center gap-2"><Icons.Alert size={16}/>{aiError}</p>}
                                            <input value={charForm.desc} onChange={e=>setCharForm({...charForm,desc:e.target.value})} placeholder={t.charDesc} className={inputClass}/>
                                            <button onClick={addChar} className={`w-full py-3 rounded-xl font-semibold btn-glow bg-gradient-to-r ${themeData.accent} text-white`}>{t.save}</button>
                                        </div>
                                    </div>
                                )}
                                
                                {tab==='quotes' && (
                                    <div className="space-y-6 animate-fade-in">
                                        <ul className="space-y-3">
                                            {(book.quotes||[]).map((q,i) => (
                                                <li key={i} className={`text-lg italic p-4 rounded-xl ${themeData.input} border-l-4 border-amber-400`}>
                                                    "{q}"
                                                </li>
                                            ))}
                                        </ul>
                                        <div className="flex gap-3">
                                            <input 
                                                value={newQuote} 
                                                onChange={e=>setNewQuote(e.target.value)} 
                                                placeholder={t.quotePH} 
                                                className={`flex-1 ${inputClass}`}
                                                onKeyDown={e=>e.key==='Enter'&&addQuote()}
                                            />
                                            <button onClick={addQuote} className={`px-6 py-3 rounded-xl bg-gradient-to-r ${themeData.accent} text-white btn-glow`}>
                                                <Icons.Plus size={20}/>
                                            </button>
                                        </div>
                                    </div>
                                )}
                                
                                {tab==='cal' && (
                                    <div className="animate-fade-in">
                                        <h4 className={`text-sm font-bold uppercase tracking-wider mb-6 text-center ${themeData.textMuted}`}>{t.markDay}</h4>
                                        <div className="grid grid-cols-7 gap-2 max-w-sm mx-auto">
                                            {Array.from({length:daysInMonth},(_,i)=>i+1).map(d => {
                                                const isRead = (book.dates||[]).includes(new Date().getFullYear()+'-'+(new Date().getMonth()+1)+'-'+d);
                                                return (
                                                    <div 
                                                        key={d} 
                                                        onClick={()=>toggleDate(d)} 
                                                        className={`aspect-square flex items-center justify-center rounded-xl text-sm font-semibold cursor-pointer transition-all duration-300 ${
                                                            isRead 
                                                            ? `bg-gradient-to-br ${themeData.accent} text-white shadow-medium scale-105` 
                                                            : `${themeData.input} hover:scale-105`
                                                        }`}
                                                    >
                                                        {d}
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [entered, setEntered] = useState(false);
            const [lang, setLang] = useState('ES');
            const [theme, setTheme] = useState('midnight');
            const [books, setBooks] = useState([]);
            const [showAdd, setShowAdd] = useState(false);
            const [viewBook, setViewBook] = useState(null);
            const [name, setName] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const [showStats, setShowStats] = useState(false);
            const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);
            const [form, setForm] = useState({ 
                title:'', author:'', rating:0, spice:0, review:'', playlist:'', cover:null, 
                isRomance:false, progress: 0, currentPage: 0, totalPages: 0, tags: [] 
            });
            const [prompt, setPrompt] = useState('');
            const [loading, setLoading] = useState(false);
            const [aiError, setAiError] = useState('');
            const [filter, setFilter] = useState('all');
            const [search, setSearch] = useState('');
            const [sortBy, setSortBy] = useState('newest');
            const [minRating, setMinRating] = useState(0);
            const [selectedTags, setSelectedTags] = useState([]);
            const [showFilters, setShowFilters] = useState(false);
            const fileRef = useRef();
            const importRef = useRef();
            const searchInputRef = useRef();

            // Atajos de teclado
            useEffect(() => {
                const handleKeyDown = (e) => {
                    // Ctrl/Cmd + F para buscar
                    if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
                        e.preventDefault();
                        searchInputRef.current?.focus();
                    }
                    // N para nuevo libro
                    if (e.key === 'n' && !e.ctrlKey && !e.metaKey && !showAdd && !viewBook) {
                        e.preventDefault();
                        setShowAdd(true);
                    }
                    // ESC para cerrar modales
                    if (e.key === 'Escape') {
                        if (showAdd) setShowAdd(false);
                        if (viewBook) setViewBook(null);
                        if (showSettings) setShowSettings(false);
                        if (showStats) setShowStats(false);
                        if (showDeleteConfirm) setShowDeleteConfirm(null);
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [showAdd, viewBook, showSettings, showStats, showDeleteConfirm]);

            useEffect(() => {
                const b = safeLocalStorage.get('bn_books'); if(b) setBooks(JSON.parse(b));
                const n = safeLocalStorage.get('bn_name'); if(n) setName(n);
                const l = safeLocalStorage.get('bn_lang'); if(l) setLang(l);
                const t = safeLocalStorage.get('bn_theme'); 
                if(t && THEMES[t]) setTheme(t);
            }, []);

            useEffect(() => {
                safeLocalStorage.set('bn_books', JSON.stringify(books));
                safeLocalStorage.set('bn_name', name);
                safeLocalStorage.set('bn_lang', lang);
                safeLocalStorage.set('bn_theme', theme);
            }, [books, name, lang, theme]);

            const updateBook = (updatedBook) => {
                const newBooks = books.map(b => b.id === updatedBook.id ? updatedBook : b);
                setBooks(newBooks);
                setViewBook(updatedBook); 
            };

            const t = TEXTS[lang];
            const themeData = THEMES[theme] || THEMES['midnight'];

            const handleSave = () => {
                if(!form.title) return;
                setBooks([{...form, id: Date.now(), quotes:[], characters:[], dates:[]}, ...books]);
                setShowAdd(false);
                setForm({ title:'', author:'', rating:0, spice:0, review:'', playlist:'', cover:null, isRomance:false, progress: 0, currentPage: 0, totalPages: 0, tags: [] });
                playSound('page');
            };

            const generateAI = async () => {
                if(!prompt && !form.title) return;
                setLoading(true);
                setAiError('');
                try {
                    const p = form.isRomance ? `romance book cover, ${prompt||form.title}, elegant, cinematic` : `dark fantasy book cover, ${prompt||form.title}, atmospheric`;
                    const res = await fetch(`https://image.pollinations.ai/prompt/${encodeURIComponent(p)}?width=400&height=600&nologo=true`);
                    if(!res.ok) throw new Error('Error en IA');
                    const blob = await res.blob();
                    const r = new FileReader();
                    r.onload = () => { setForm({...form, cover: r.result}); setLoading(false); };
                    r.readAsDataURL(blob);
                } catch(e){ 
                    setAiError('No se pudo generar. Revisa tu conexión.');
                    setLoading(false); 
                }
            };

            const handleCoverUpload = (e) => {
                const f = e.target.files[0];
                if(!f) return;
                const val = validateImageFile(f);
                if(!val.ok) { alert(val.msg); e.target.value = ''; return; }
                const r = new FileReader();
                r.onload=()=>setForm({...form, cover:r.result});
                r.readAsDataURL(f);
            };

            const toggleTag = (tag) => {
                if (form.tags.includes(tag)) {
                    setForm({...form, tags: form.tags.filter(t => t !== tag)});
                } else {
                    setForm({...form, tags: [...form.tags, tag]});
                }
            };

            const exportLibrary = () => {
                const data = { books, name, lang, theme, exportedAt: new Date().toISOString() };
                const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `booknook-backup-${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
                playSound('page');
            };

            const importLibrary = (e) => {
                const f = e.target.files[0];
                if(!f) return;
                if(f.type !== 'application/json') { alert('Solo archivos .json'); return; }
                
                const r = new FileReader();
                r.onload = () => {
                    try {
                        const data = JSON.parse(r.result);
                        if(!data.books || !Array.isArray(data.books)) throw new Error('Formato inválido');
                        if(confirm(`Importar ${data.books.length} libros. ¿Reemplazar biblioteca actual?`)) {
                            setBooks(data.books);
                            if(data.name) setName(data.name);
                            if(data.lang) setLang(data.lang);
                            if(data.theme && THEMES[data.theme]) setTheme(data.theme);
                            playSound('slam');
                        }
                    } catch(err) {
                        alert('Error al importar: ' + err.message);
                    }
                };
                r.readAsText(f);
                e.target.value = '';
            };

            const handleDelete = (book) => {
                setShowDeleteConfirm(book);
            };

            const confirmDelete = () => {
                if (showDeleteConfirm) {
                    setBooks(books.filter(x => x.id !== showDeleteConfirm.id));
                    setShowDeleteConfirm(null);
                    playSound('page');
                }
            };

            // Filtrar y ordenar libros
            const filteredAndSortedBooks = books
                .filter(b => {
                    // Búsqueda avanzada (título, autor, personajes, citas, tags)
                    const searchLower = search.toLowerCase();
                    const matchesSearch = !search || 
                        b.title.toLowerCase().includes(searchLower) || 
                        b.author.toLowerCase().includes(searchLower) ||
                        (b.characters && b.characters.some(c => c.name.toLowerCase().includes(searchLower))) ||
                        (b.quotes && b.quotes.some(q => q.toLowerCase().includes(searchLower))) ||
                        (b.tags && b.tags.some(tag => tag.toLowerCase().includes(searchLower)));

                    // Filtros
                    const matchesFilter = filter === 'all' || 
                        (filter === 'romance' && b.isRomance) || 
                        (filter === 'read' && b.dates && b.dates.length > 0) ||
                        (filter === 'reading' && b.progress > 0 && b.progress < 100) ||
                        (filter === 'finished' && b.progress === 100);

                    // Rating mínimo
                    const matchesRating = b.rating >= minRating;

                    // Tags seleccionados
                    const matchesTags = selectedTags.length === 0 || 
                        (b.tags && selectedTags.every(tag => b.tags.includes(tag)));

                    return matchesSearch && matchesFilter && matchesRating && matchesTags;
                })
                .sort((a, b) => {
                    switch(sortBy) {
                        case 'newest': return b.id - a.id;
                        case 'oldest': return a.id - b.id;
                        case 'highestRated': return b.rating - a.rating;
                        case 'lowestRated': return a.rating - b.rating;
                        case 'titleAZ': return a.title.localeCompare(b.title);
                        case 'titleZA': return b.title.localeCompare(a.title);
                        case 'authorAZ': return a.author.localeCompare(b.author);
                        default: return 0;
                    }
                });

            if (!entered) return <Welcome onEnter={()=>{playSound('slam'); setEntered(true)}} lang={lang} setLang={setLang} />;

            return (
                <div className={`min-h-screen pb-24 relative transition-all duration-700 font-sans ${themeData.bg} bg-gradient-to-br ${themeData.bgGradient}`}>
                    <div className="fixed inset-0 pointer-events-none z-[-1] bg-cover bg-center opacity-30" style={{backgroundImage: `url('${themeData.backgroundImage}')`}}>
                        <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/40 to-black/60"></div>
                    </div>

                    <header className="sticky top-0 z-30 px-6 py-5 glass-dark shadow-medium">
                        <div className="max-w-7xl mx-auto space-y-4">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                <div className="flex items-center gap-3">
                                    <div className={`p-3 rounded-2xl bg-gradient-to-br ${themeData.accent} shadow-glow`}>
                                        <Icons.Book size={28} fill="white"/>
                                    </div>
                                    <div>
                                        <h1 className="font-serif text-3xl font-bold gradient-text">{name ? `Biblioteca de ${name}` : t.title}</h1>
                                        <p className={`text-sm ${themeData.textMuted}`}>{books.length} {books.length === 1 ? 'libro' : 'libros'}</p>
                                    </div>
                                </div>
                                
                                <div className="flex items-center gap-3 flex-wrap justify-center">
                                    <select 
                                        value={theme} 
                                        onChange={(e)=>setTheme(e.target.value)}
                                        className={`px-4 py-2 rounded-xl ${themeData.input} border ${themeData.border} text-sm font-semibold outline-none focus:ring-2 focus:ring-amber-400/50`}
                                    >
                                        {Object.entries(THEMES).map(([key, val]) => (
                                            <option key={key} value={key}>{val.name}</option>
                                        ))}
                                    </select>
                                    
                                    <button onClick={()=>setShowStats(true)} className={`p-2.5 rounded-xl ${themeData.input} border ${themeData.border} hover:opacity-80 transition`} title={t.stats}>
                                        <Icons.Chart size={20}/>
                                    </button>
                                    
                                    <div className="flex gap-2">
                                        <button onClick={exportLibrary} className={`p-2.5 rounded-xl ${themeData.input} border ${themeData.border} hover:opacity-80 transition`} title={t.export}>
                                            <Icons.Download size={20}/>
                                        </button>
                                        <button onClick={()=>importRef.current.click()} className={`p-2.5 rounded-xl ${themeData.input} border ${themeData.border} hover:opacity-80 transition`} title={t.import}>
                                            <Icons.Upload size={20}/>
                                        </button>
                                        <input type="file" ref={importRef} hidden accept=".json" onChange={importLibrary}/>
                                        <button onClick={()=>setShowSettings(true)} className={`p-2.5 rounded-xl ${themeData.input} border ${themeData.border} hover:opacity-80 transition`}>
                                            <Icons.Settings size={20}/>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* Barra de búsqueda y filtros */}
                            <div className="flex flex-col md:flex-row gap-3">
                                <div className="relative flex-1">
                                    <Icons.Search size={18} className="absolute left-4 top-1/2 -translate-y-1/2 opacity-50"/>
                                    <input 
                                        ref={searchInputRef}
                                        type="text" 
                                        placeholder={`${t.search} (${t.shortcuts}: Ctrl+F)`}
                                        value={search}
                                        onChange={(e)=>setSearch(e.target.value)}
                                        className={`w-full pl-12 pr-4 py-3 rounded-xl ${themeData.input} border ${themeData.border} outline-none focus:ring-2 focus:ring-amber-400/50`}
                                    />
                                </div>
                                
                                <div className="flex gap-2 flex-wrap">
                                    <select 
                                        value={filter}
                                        onChange={(e)=>setFilter(e.target.value)}
                                        className={`px-4 py-3 rounded-xl ${themeData.input} border ${themeData.border} text-sm font-semibold outline-none`}
                                    >
                                        <option value="all">{t.allBooks}</option>
                                        <option value="romance">{t.romance}</option>
                                        <option value="reading">{t.reading}</option>
                                        <option value="finished">{t.finished}</option>
                                        <option value="toRead">{t.toRead}</option>
                                    </select>

                                    <select 
                                        value={sortBy}
                                        onChange={(e)=>setSortBy(e.target.value)}
                                        className={`px-4 py-3 rounded-xl ${themeData.input} border ${themeData.border} text-sm font-semibold outline-none`}
                                    >
                                        <option value="newest">{t.newest}</option>
                                        <option value="oldest">{t.oldest}</option>
                                        <option value="highestRated">{t.highestRated}</option>
                                        <option value="lowestRated">{t.lowestRated}</option>
                                        <option value="titleAZ">{t.titleAZ}</option>
                                        <option value="titleZA">{t.titleZA}</option>
                                        <option value="authorAZ">{t.authorAZ}</option>
                                    </select>

                                    <button 
                                        onClick={()=>setShowFilters(!showFilters)}
                                        className={`px-4 py-3 rounded-xl ${themeData.input} border ${themeData.border} flex items-center gap-2`}
                                    >
                                        <Icons.Filter size={16}/> {t.filter}
                                    </button>
                                </div>
                            </div>

                            {/* Filtros avanzados */}
                            {showFilters && (
                                <div className={`p-4 rounded-xl ${themeData.input} border ${themeData.border} animate-slide-up`}>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className={`block text-sm font-semibold mb-2 ${themeData.textMuted}`}>{t.rating} mínimo</label>
                                            <div className="flex gap-2">
                                                {[0,1,2,3,4,5].map(rating => (
                                                    <button
                                                        key={rating}
                                                        onClick={()=>setMinRating(rating)}
                                                        className={`px-3 py-1 rounded-lg text-sm font-semibold transition ${
                                                            minRating === rating 
                                                            ? 'bg-gradient-to-r from-amber-500 to-yellow-600 text-white' 
                                                            : `${themeData.input} border ${themeData.border}`
                                                        }`}
                                                    >
                                                        {rating === 0 ? 'Todos' : `${rating}+⭐`}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        
                                        <div>
                                            <label className={`block text-sm font-semibold mb-2 ${themeData.textMuted}`}>{t.selectTags}</label>
                                            <div className="flex flex-wrap gap-2 max-h-32 overflow-y-auto">
                                                {AVAILABLE_TAGS.map(tag => (
                                                    <button
                                                        key={tag}
                                                        onClick={()=>{
                                                            if (selectedTags.includes(tag)) {
                                                                setSelectedTags(selectedTags.filter(t => t !== tag));
                                                            } else {
                                                                setSelectedTags([...selectedTags, tag]);
                                                            }
                                                        }}
                                                        className={`tag px-3 py-1 rounded-full text-xs font-semibold border ${
                                                            selectedTags.includes(tag)
                                                            ? 'active'
                                                            : `${themeData.input} ${themeData.border}`
                                                        }`}
                                                    >
                                                        {tag}
                                                    </button>
                                                ))}
                                            </div>
                                            {selectedTags.length > 0 && (
                                                <button 
                                                    onClick={()=>setSelectedTags([])}
                                                    className="text-xs mt-2 opacity-60 hover:opacity-100"
                                                >
                                                    Limpiar tags
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="p-6 md:p-8 max-w-7xl mx-auto z-10 relative">
                        {filteredAndSortedBooks.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-32 text-center animate-fade-in">
                                <div className={`w-24 h-24 rounded-full ${themeData.input} border ${themeData.border} flex items-center justify-center mb-6`}>
                                    <Icons.Book size={48} className="opacity-50"/>
                                </div>
                                <h2 className="font-serif text-3xl font-bold mb-2">{t.empty}</h2>
                                <p className={`${themeData.textMuted} max-w-md`}>{t.emptySub}</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                                {filteredAndSortedBooks.map(b => (
                                    <div 
                                        key={b.id} 
                                        onClick={()=>setViewBook(b)}
                                        className={`book-card group relative rounded-2xl overflow-hidden ${themeData.cardBg} border ${themeData.border} cursor-pointer backdrop-blur-sm`}
                                    >
                                        <div className="aspect-[2/3] relative overflow-hidden">
                                            {b.cover ? (
                                                <img src={b.cover} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"/>
                                            ) : (
                                                <div className={`w-full h-full flex items-center justify-center text-center p-4 bg-gradient-to-br ${themeData.accent}`}>
                                                    <span className="font-serif text-2xl font-semibold text-white">{b.title}</span>
                                                </div>
                                            )}
                                            
                                            {b.isRomance && (
                                                <div className="absolute top-3 left-3 px-3 py-1 rounded-full bg-gradient-to-r from-rose-500 to-pink-600 text-white text-xs font-bold shadow-medium">
                                                    <Icons.Heart size={12} fill="white" className="inline mr-1"/> Romance
                                                </div>
                                            )}

                                            {b.progress === 100 && (
                                                <div className="absolute top-3 right-12 px-3 py-1 rounded-full bg-gradient-to-r from-emerald-500 to-green-600 text-white text-xs font-bold shadow-medium">
                                                    <Icons.Check size={12} className="inline"/>
                                                </div>
                                            )}
                                            
                                            <button 
                                                onClick={(e)=>{e.stopPropagation(); handleDelete(b)}} 
                                                className="absolute top-3 right-3 p-2 rounded-full bg-black/60 text-white opacity-0 group-hover:opacity-100 hover:bg-red-600 transition-all duration-300 backdrop-blur-sm"
                                            >
                                                <Icons.Trash size={16}/>
                                            </button>
                                            
                                            <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>

                                            {/* Barra de progreso */}
                                            {b.progress > 0 && b.progress < 100 && (
                                                <div className="absolute bottom-0 left-0 right-0 h-1 bg-black/50">
                                                    <div className="progress-bar h-full" style={{width: `${b.progress}%`}}></div>
                                                </div>
                                            )}
                                        </div>
                                        
                                        <div className="p-4 space-y-3">
                                            <div>
                                                <h3 className="font-serif text-xl font-bold leading-tight line-clamp-2 mb-1">{b.title}</h3>
                                                <p className={`text-sm ${themeData.textMuted} truncate`}>{b.author}</p>
                                            </div>
                                            
                                            <div className="flex items-center justify-between">
                                                <div className="flex gap-0.5">
                                                    {[1,2,3,4,5].map(n => (
                                                        <Icons.Star key={n} size={14} fill={n<=b.rating ? themeData.primary : 'none'} stroke={themeData.primary}/>
                                                    ))}
                                                </div>
                                                {b.spice > 0 && (
                                                    <div className="flex gap-0.5">
                                                        {[1,2,3].map(n => (
                                                            <Icons.Flame key={n} size={12} fill={n<=b.spice ? '#f97316' : 'none'} stroke={n<=b.spice ? '#f97316' : 'currentColor'}/>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>

                                            {b.tags && b.tags.length > 0 && (
                                                <div className="flex flex-wrap gap-1">
                                                    {b.tags.slice(0, 3).map((tag, i) => (
                                                        <span key={i} className="text-[10px] px-2 py-0.5 rounded-full bg-white/10">
                                                            {tag}
                                                        </span>
                                                    ))}
                                                    {b.tags.length > 3 && (
                                                        <span className="text-[10px] px-2 py-0.5 opacity-60">+{b.tags.length - 3}</span>
                                                    )}
                                                </div>
                                            )}
                                            
                                            <div className="flex gap-2 pt-2 border-t border-white/10">
                                                {b.playlist && <div className="flex-1 text-center text-xs opacity-60"><Icons.Music size={12} className="inline mr-1"/></div>}
                                                {b.characters && b.characters.length > 0 && <div className="flex-1 text-center text-xs opacity-60"><Icons.User size={12} className="inline mr-1"/>{b.characters.length}</div>}
                                                {b.quotes && b.quotes.length > 0 && <div className="flex-1 text-center text-xs opacity-60"><Icons.Quote size={12} className="inline mr-1"/>{b.quotes.length}</div>}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <button 
                        onClick={()=>setShowAdd(true)} 
                        className={`fixed bottom-8 right-8 p-5 rounded-2xl text-white shadow-large btn-glow z-40 bg-gradient-to-br ${themeData.accent}`}
                    >
                        <Icons.Plus size={28}/>
                    </button>

                    {/* Modal Añadir Libro */}
                    {showAdd && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md animate-fade-in">
                            <div className={`w-full max-w-3xl max-h-[90vh] overflow-y-auto rounded-3xl p-8 relative shadow-2xl animate-scale-in ${themeData.cardBg} backdrop-blur-xl border ${themeData.border}`}>
                                <button onClick={()=>setShowAdd(false)} className="absolute top-4 right-4 p-2 rounded-full bg-black/40 hover:bg-black/60 transition">
                                    <Icons.X size={20}/>
                                </button>
                                
                                <h2 className="font-serif text-4xl font-bold text-center mb-8 gradient-text">{t.add}</h2>
                                
                                <div className="space-y-6">
                                    <div className="flex gap-6">
                                        <div className="w-1/3 space-y-3">
                                            <div onClick={()=>fileRef.current.click()} className="aspect-[2/3] rounded-2xl border-2 border-dashed border-white/30 flex flex-col items-center justify-center cursor-pointer hover:border-amber-400 hover:bg-white/5 transition overflow-hidden group">
                                                {form.cover ? (
                                                    <img src={form.cover} className="w-full h-full object-cover"/>
                                                ) : (
                                                    <div className="text-center p-4 opacity-60 group-hover:opacity-100 transition">
                                                        <Icons.Upload size={32} className="mx-auto mb-2"/>
                                                        <span className="text-xs">{t.cover}</span>
                                                    </div>
                                                )}
                                            </div>
                                            <input type="file" ref={fileRef} hidden accept="image/*" onChange={handleCoverUpload}/>
                                        </div>
                                        
                                        <div className="w-2/3 space-y-4">
                                            <input value={form.title} onChange={e=>setForm({...form, title:e.target.value})} placeholder={t.titlePH} className="input-elegant w-full bg-transparent p-3 text-2xl font-serif font-bold outline-none"/>
                                            <input value={form.author} onChange={e=>setForm({...form, author:e.target.value})} placeholder={t.authPH} className="input-elegant w-full bg-transparent p-3 outline-none"/>
                                            <div className="flex items-center gap-3 p-3 rounded-xl bg-white/5">
                                                <input type="checkbox" checked={form.isRomance} onChange={e=>setForm({...form, isRomance:e.target.checked})} className="w-5 h-5 rounded accent-amber-500"/>
                                                <span className="font-semibold">{t.rom}</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className={`p-4 rounded-2xl ${themeData.input} border ${themeData.border} flex gap-3`}>
                                        <input value={prompt} onChange={e=>setPrompt(e.target.value)} placeholder="Ej. Castillo medieval oscuro, romance gótico..." className="flex-1 bg-transparent text-sm outline-none"/>
                                        <button onClick={generateAI} disabled={loading} className={`px-5 py-2.5 rounded-xl bg-gradient-to-r from-purple-500 to-indigo-600 text-white text-sm font-semibold btn-glow flex items-center gap-2 whitespace-nowrap`}>
                                            <Icons.Wand size={16}/> {loading?'...':t.gen}
                                        </button>
                                    </div>
                                    {aiError && <p className="text-sm text-red-400 flex items-center gap-2"><Icons.Alert size={16}/>{aiError}</p>}

                                    {/* Tags */}
                                    <div>
                                        <label className={`block text-sm font-semibold mb-2 ${themeData.textMuted}`}>{t.selectTags}</label>
                                        <div className="flex flex-wrap gap-2 max-h-32 overflow-y-auto p-3 rounded-xl bg-white/5">
                                            {AVAILABLE_TAGS.map(tag => (
                                                <button
                                                    key={tag}
                                                    type="button"
                                                    onClick={()=>toggleTag(tag)}
                                                    className={`tag px-3 py-1.5 rounded-full text-xs font-semibold border transition ${
                                                        form.tags.includes(tag)
                                                        ? 'active'
                                                        : `${themeData.input} ${themeData.border}`
                                                    }`}
                                                >
                                                    {tag}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Progreso de lectura */}
                                    <div className={`p-4 rounded-2xl ${themeData.input} border ${themeData.border}`}>
                                        <h3 className="font-semibold mb-4">{t.progress}</h3>
                                        <div className="space-y-3">
                                            <div>
                                                <label className={`block text-xs mb-1 ${themeData.textMuted}`}>{t.currentPage}</label>
                                                <input 
                                                    type="number" 
                                                    value={form.currentPage || ''} 
                                                    onChange={e=>setForm({...form, currentPage: parseInt(e.target.value) || 0})}
                                                    className={`w-full px-3 py-2 rounded-lg ${themeData.input} border ${themeData.border} outline-none`}
                                                    placeholder="0"
                                                />
                                            </div>
                                            <div>
                                                <label className={`block text-xs mb-1 ${themeData.textMuted}`}>{t.totalPages}</label>
                                                <input 
                                                    type="number" 
                                                    value={form.totalPages || ''} 
                                                    onChange={e=>{
                                                        const total = parseInt(e.target.value) || 0;
                                                        const current = form.currentPage || 0;
                                                        const progress = total > 0 ? Math.round((current / total) * 100) : 0;
                                                        setForm({...form, totalPages: total, progress});
                                                    }}
                                                    className={`w-full px-3 py-2 rounded-lg ${themeData.input} border ${themeData.border} outline-none`}
                                                    placeholder="0"
                                                />
                                            </div>
                                            {form.totalPages > 0 && form.currentPage > 0 && (
                                                <div>
                                                    <div className="flex justify-between text-xs mb-1">
                                                        <span>{t.progress}</span>
                                                        <span className="font-bold" style={{color: themeData.primary}}>{form.progress}%</span>
                                                    </div>
                                                    <div className="w-full bg-black/30 rounded-full h-2">
                                                        <div className="progress-bar h-2 rounded-full" style={{width: `${form.progress}%`}}></div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    <div className="flex justify-between items-center p-4 rounded-xl bg-white/5">
                                        <span className="text-sm font-bold uppercase tracking-wider opacity-70">{t.rating}</span>
                                        <div className="flex gap-2">{[1,2,3,4,5].map(n=><div key={n} className="cursor-pointer hover:scale-110 transition" onClick={()=>setForm({...form, rating:n})}><Icons.Star size={32} fill={n<=form.rating ? themeData.primary : 'none'} stroke={themeData.primary}/></div>)}</div>
                                    </div>
                                    
                                    {form.isRomance && (
                                        <div className="flex justify-between items-center p-4 rounded-xl bg-white/5 animate-slide-up">
                                            <span className="text-sm font-bold uppercase tracking-wider opacity-70">{t.spice}</span>
                                            <div className="flex gap-2">{[1,2,3,4,5].map(n=><div key={n} className="cursor-pointer hover:scale-110 transition" onClick={()=>setForm({...form, spice:n})}><Icons.Flame size={32} fill={n<=form.spice ? '#f97316' : 'none'} stroke={n<=form.spice ? '#f97316' : 'currentColor'}/></div>)}</div>
                                        </div>
                                    )}

                                    <input value={form.playlist} onChange={e=>setForm({...form, playlist:e.target.value})} placeholder={t.playPH} className="input-elegant w-full bg-transparent p-3 outline-none rounded-lg"/>
                                    <textarea value={form.review} onChange={e=>setForm({...form, review:e.target.value})} placeholder={t.revPH} rows="4" className={`w-full ${themeData.input} border ${themeData.border} rounded-xl p-4 outline-none resize-none focus:ring-2 focus:ring-amber-400/30`}></textarea>
                                    
                                    <button onClick={handleSave} className={`w-full py-4 rounded-2xl font-serif text-xl font-bold text-white shadow-large btn-glow bg-gradient-to-r ${themeData.accent}`}>{t.save}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {viewBook && <BookModal book={viewBook} onClose={()=>setViewBook(null)} theme={theme} t={t} onUpdate={updateBook} />}
